<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>출석 체크</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif;
    background:#f0f4f8;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:1.5rem;
  }
  .card{
    background:#fff;border-radius:24px;
    padding:2.5rem 2rem 2rem;
    width:100%;max-width:400px;
    box-shadow:0 4px 32px rgba(0,0,0,0.09);
  }
  .top{text-align:center;margin-bottom:2rem}
  .icon-wrap{
    width:68px;height:68px;background:#e8f0fe;
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    margin:0 auto 1rem;font-size:30px;
  }
  h1{font-size:22px;font-weight:700;color:#1a237e;margin-bottom:6px}
  .date-chip{
    display:inline-block;background:#e8f0fe;color:#1a237e;
    font-size:13px;font-weight:500;padding:5px 16px;border-radius:20px;
  }
  .input-wrap{position:relative;margin-bottom:1rem}
  input[type=text]{
    width:100%;padding:15px 16px;
    font-size:18px;font-family:'Noto Sans KR',sans-serif;
    border:2px solid #e0e0e0;border-radius:14px;
    background:#fafafa;color:#1a1a2e;
    transition:border-color .2s,box-shadow .2s;
    -webkit-appearance:none;
  }
  input[type=text]:focus{
    outline:none;border-color:#1a237e;background:#fff;
    box-shadow:0 0 0 4px rgba(26,35,126,.08);
  }
  input[type=text]::placeholder{color:#bbb}
  .dropdown{
    display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
    background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;
    box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:10;overflow:hidden;
  }
  .dropdown.show{display:block}
  .dropdown-item{
    padding:13px 16px;font-size:15px;cursor:pointer;
    display:flex;align-items:center;gap:10px;transition:background .1s;
  }
  .dropdown-item:hover,.dropdown-item.active{background:#f0f4ff}
  .zone-tag{
    font-size:12px;color:#1a237e;background:#e8f0fe;
    border-radius:6px;padding:2px 8px;margin-left:auto;white-space:nowrap;
  }
  .btn{
    width:100%;padding:16px;background:#1a237e;color:#fff;
    border:none;border-radius:14px;font-size:17px;font-weight:700;
    font-family:'Noto Sans KR',sans-serif;cursor:pointer;
    transition:background .2s,transform .1s;
  }
  .btn:hover{background:#0d1464}
  .btn:active{transform:scale(.98)}
  .btn:disabled{background:#b0bec5;cursor:not-allowed}
  .error{
    display:none;background:#fff3f3;color:#c62828;
    border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:1rem;
  }
  .success{display:none;text-align:center;padding:1rem 0}
  .check-wrap{
    width:80px;height:80px;background:#e8f5e9;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 1.2rem;font-size:36px;
    animation:pop .4s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  .success h2{font-size:21px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
  .success .sub{font-size:14px;color:#888;margin-bottom:1.2rem}
  .info-box{
    background:#f0f7ff;border-radius:12px;
    padding:14px 18px;font-size:14px;color:#1a237e;line-height:1.8;
  }
  .btn-again{
    margin-top:1.2rem;width:100%;padding:13px;
    background:#f5f5f5;color:#555;border:none;border-radius:12px;
    font-size:14px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  }
  .btn-again:hover{background:#ebebeb}
  .spinner{
    display:inline-block;width:18px;height:18px;
    border:2px solid #fff;border-top-color:transparent;
    border-radius:50%;animation:spin .7s linear infinite;
    vertical-align:middle;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>

  </div>

const DAYS = ["일","월","화","수","목","금","토"];
let selectedMember = null;
let activeIdx = -1;
let filtered = [];

function getToday() {
  const d = new Date();
  const m = d.getMonth()+1, day = d.getDate(), dow = DAYS[d.getDay()];
  return {
    label:     `${m}월 ${day}일 (${dow})`,
    dateShort: `${m}/${day}`,          // 시트 헤더와 일치: "6/1"
    time: d.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})
  };
}

function init() {
  document.getElementById("date-chip").textContent = getToday().label;
}

function onInput() {
  const val = document.getElementById("name-input").value.trim();
  selectedMember = null;
  document.getElementById("err").style.display = "none";
  if (!val) { closeDropdown(); return; }

  filtered = MEMBERS.filter(m => m.name.includes(val));
  activeIdx = filtered.length === 1 ? 0 : -1;
  if (!filtered.length) { closeDropdown(); return; }
  renderDropdown(val);
  document.getElementById("dropdown").classList.add("show");
}

function renderDropdown(val) {
  val = val || document.getElementById("name-input").value.trim();
  document.getElementById("dropdown").innerHTML = filtered.map((m,i) =>
    `<div class="dropdown-item ${i===activeIdx?'active':''}" onclick="select(${i})">
      <span>${m.name.replace(val,`<strong style="color:#1a237e">${val}</strong>`)}</span>
      <span class="zone-tag">${m.zone}</span>
    </div>`
  ).join("");
}

function onKey(e) {
  const ddOpen = document.getElementById("dropdown").classList.contains("show");
  if (!ddOpen) { if(e.key==="Enter") submit(); return; }
  if (e.key==="ArrowDown") { activeIdx=Math.min(activeIdx+1,filtered.length-1); renderDropdown(); e.preventDefault(); }
  else if (e.key==="ArrowUp") { activeIdx=Math.max(activeIdx-1,0); renderDropdown(); e.preventDefault(); }
  else if (e.key==="Enter") { if(activeIdx>=0) select(activeIdx); e.preventDefault(); }
  else if (e.key==="Escape") closeDropdown();
}

function select(i) {
  selectedMember = filtered[i];
  document.getElementById("name-input").value = selectedMember.name;
  closeDropdown();
}

function closeDropdown() {
  document.getElementById("dropdown").classList.remove("show");
}

async function submit() {
  const raw = document.getElementById("name-input").value.trim();
  const errEl = document.getElementById("err");
  if (!raw) { showErr("이름을 입력해주세요."); return; }

  const member = selectedMember || MEMBERS.find(m => m.name === raw);
  if (!member) { showErr("명단에 없는 이름입니다. 다시 확인해주세요."); return; }

  setLoading(true);
  const today = getToday();

  const payload = {
    action:    "attend",
    name:      member.name,
    zone:      member.zone,
    dateShort: today.dateShort,   // "6/1" — 시트 헤더 열 이름과 동일
    dateLabel: today.label,
    timestamp: today.time
  };

  try {
    if (SCRIPT_URL !== "여기에_앱스스크립트_URL_입력") {
      await fetch(SCRIPT_URL, {
        method:"POST", mode:"no-cors",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });
    } else {
      await new Promise(r=>setTimeout(r,800));
    }
    showSuccess(member, today);
  } catch(e) {
    showErr("전송 실패. 다시 시도해주세요.");
    setLoading(false);
  }
}

function showErr(msg) {
  const el = document.getElementById("err");
  el.textContent = msg; el.style.display = "block";
}

function setLoading(on) {
  document.getElementById("submit-btn").disabled = on;
  document.getElementById("btn-spinner").style.display = on ? "inline":"none";
  document.getElementById("btn-label").textContent = on ? "전송 중...":"✅ 출석 체크";
}

function showSuccess(member, today) {
  document.getElementById("form-area").style.display = "none";
  document.getElementById("success-area").style.display = "block";
  document.getElementById("ok-name").textContent = `${member.name}님, 출석 완료! 👋`;
  document.getElementById("ok-info").innerHTML =
    `📅 <strong>${today.label}</strong><br>🕐 ${today.time} &nbsp;|&nbsp; 📍 ${member.zone}`;
}

function reset() {
  document.getElementById("form-area").style.display = "block";
  document.getElementById("success-area").style.display = "none";
  document.getElementById("name-input").value = "";
  document.getElementById("err").style.display = "none";
  selectedMember = null;
  setLoading(false);
}

document.addEventListener("click", e => {
  if (!e.target.closest(".input-wrap")) closeDropdown();
});

init();
</script>
</body>
</html>
