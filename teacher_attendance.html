    background: #f5f7fa;
    min-height: 100vh;
    color: #1a1a2e;
  }

  .topbar {
    background: #1a237e;
    color: #fff;
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar h1 { font-size: 17px; font-weight: 700; flex: 1; }
  .topbar .date-info { font-size: 13px; opacity: 0.75; }

  .tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 0 1.5rem;
  }

  .tab {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 500;
    color: #777;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab.active {
    color: #1a237e;
    border-bottom-color: #1a237e;
  }

  .content { padding: 1.5rem; max-width: 900px; margin: 0 auto; }

  /* Summary cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: #fff;
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
    border: 1px solid #e8e8e8;
  }

  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card .lbl { font-size: 12px; color: #888; }
  .stat-card.present .num { color: #1565c0; }
  .stat-card.absent .num { color: #c62828; }
  .stat-card.rate .num { color: #2e7d32; }

  /* Date selector */
  .date-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }

  .date-row label { font-size: 14px; font-weight: 500; }

  .date-row input[type="date"] {
    padding: 8px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #1a1a2e;
    background: #fff;
  }

  .date-row input[type="date"]:focus {
    outline: none;
    border-color: #1a237e;
  }

  .btn-sync {
    padding: 8px 16px;
    background: #1a237e;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-sync:hover { background: #0d1464; }

    background: #fff;
    border-radius: 14px;
    border: 1px solid #e8e8e8;
    overflow: hidden;
  }

  .list-header {
    display: grid;
    grid-template-columns: 2fr 1fr 1.5fr 1fr;
    padding: 10px 16px;
    background: #f5f7fa;
    font-size: 12px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #e8e8e8;
  }

  .student-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1.5fr 1fr;
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
    align-items: center;
    transition: background 0.15s;
  }

  .student-row:last-child { border-bottom: none; }
  .student-row:hover { background: #fafafa; }

  .student-name { font-size: 15px; font-weight: 500; }
  .student-id { font-size: 13px; color: #999; }

  .time-cell { font-size: 13px; color: #555; }

  .status-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    border: 1.5px solid;
    cursor: pointer;
    transition: all 0.15s;
  }

  .status-btn.present {
    background: #e3f2fd;
    color: #1565c0;
    border-color: #90caf9;
  }

  .status-btn.absent {
    background: #fff3f3;
    color: #c62828;
    border-color: #ef9a9a;
  }

  .status-btn.none {
    background: #f5f5f5;
    color: #999;
    border-color: #e0e0e0;
  }

  .status-btn:hover { opacity: 0.8; }

  .action-cell { display: flex; gap: 6px; }

  .btn-small {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid #e0e0e0;
    background: #fff;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    color: #555;
    transition: background 0.15s;
  }

  .btn-small:hover { background: #f5f5f5; }
  .btn-small.danger { color: #c62828; border-color: #ef9a9a; }
  .btn-small.danger:hover { background: #fff3f3; }

  /* History tab */
  .history-table {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e8e8e8;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 500px;
  }

  thead th {
    background: #f5f7fa;
    padding: 10px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 500;
    color: #888;
    border-bottom: 1px solid #e8e8e8;
  }

  tbody td {
    padding: 11px 14px;
    border-bottom: 1px solid #f0f0f0;
    color: #333;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fafafa; }

    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;

  .badge.present { background: #e3f2fd; color: #1565c0; }
  .badge.absent { background: #fff3f3; color: #c62828; }

  .export-section {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e8e8e8;
    padding: 1.5rem;
    margin-bottom: 1.5rem;

    border-radius: 8px;
    border: 1.5px solid;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;

    font-weight: 500;

    color: #7a5c00;

    font-size: 12px;

  .panel.active { display: block; }

    text-align: center;
    padding: 3rem 1rem;
    color: #aaa;
    font-size: 14px;

  </div>

    </div>

    </div>
  </div>

</div>

const CLASS_NAME = "출석부";

// ===================================================

const DAYS = ["일","월","화","수","목","금","토"];

let attendance = JSON.parse(localStorage.getItem("attendance_v1") || "{}");
let currentDate = getTodayStr();

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;
}

function formatDateKo(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;
}

function init() {
  const today = new Date();
  document.getElementById("topbar-date").textContent = formatDateKo(getTodayStr());
  document.getElementById("date-picker").value = currentDate;

  if (SCRIPT_URL !== "여기에_구글_앱스_스크립트_URL_입력") {
    document.getElementById("config-notice").style.display = "none";
  }

  renderStudents();
  renderHistory();
  renderScript();
}

function onDateChange() {
  currentDate = document.getElementById("date-picker").value;
  renderStudents();
}

function getRecord(date, name) {
  if (!attendance[date]) attendance[date] = {};
  return attendance[date][name] || { status: "none", time: "", method: "" };
}

function setRecord(date, name, status, time, method) {
  if (!attendance[date]) attendance[date] = {};
  attendance[date][name] = { status, time, method };
  localStorage.setItem("attendance_v1", JSON.stringify(attendance));
}

function toggleStatus(name) {
  const rec = getRecord(currentDate, name);
  const now = new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
  let newStatus;
  if (rec.status === "none") newStatus = "present";
  else if (rec.status === "present") newStatus = "absent";
  else newStatus = "none";
  setRecord(currentDate, name, newStatus, newStatus === "present" ? now : "", "수동");
  renderStudents();
  renderHistory();
}

function renderStudents() {
  const container = document.getElementById("student-rows");
  let present = 0, absent = 0;

  container.innerHTML = STUDENTS.map(s => {
    const rec = getRecord(currentDate, s.name);
    if (rec.status === "present") present++;
    if (rec.status === "absent") absent++;

    let btnClass = "none", btnText = "미체크", btnIcon = "⬜";
    if (rec.status === "present") { btnClass = "present"; btnText = "출석"; btnIcon = "✅"; }
    if (rec.status === "absent") { btnClass = "absent"; btnText = "결석"; btnIcon = "❌"; }

    return `<div class="student-row">
      <div>
        <div class="student-name">${s.name}</div>
      </div>
      <div class="student-id">${s.id}</div>
      <div class="time-cell">${rec.time || "-"}</div>
      <div>
        <button class="status-btn ${btnClass}" onclick="toggleStatus('${s.name}')">
          ${btnIcon} ${btnText}
        </button>
      </div>
    </div>`;
  }).join("");

  const total = STUDENTS.length;
  document.getElementById("stat-present").textContent = present;
  document.getElementById("stat-absent").textContent = total - present;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-rate").textContent = Math.round(present / total * 100) + "%";
}

function renderHistory() {
  const tbody = document.getElementById("history-body");
  const rows = [];

  Object.keys(attendance).sort((a, b) => b.localeCompare(a)).forEach(date => {
    Object.keys(attendance[date]).forEach(name => {
      const rec = attendance[date][name];
      if (rec.status === "none") return;
      const stu = STUDENTS.find(s => s.name === name) || { id: "" };
      rows.push({ date, name, id: stu.id, ...rec });
    });
  });

  if (rows.length === 0) {
    tbody.innerHTML = "";
    document.getElementById("history-empty").style.display = "block";
    return;
  }

  document.getElementById("history-empty").style.display = "none";
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${formatDateLabel(r.date)}</td>
      <td>${r.name}</td>
      <td>${r.id}</td>
      <td>${r.time || "-"}</td>
      <td><span class="badge ${r.status}">${r.status === "present" ? "출석" : "결석"}</span></td>
      <td>${r.method || "수동"}</td>
    </tr>
  `).join("");
}

function exportCSV() {
  const rows = [["날짜", "이름", "학번", "시간", "상태", "방법"]];

  Object.keys(attendance).sort().forEach(date => {
    STUDENTS.forEach(s => {
      const rec = attendance[date]?.[s.name];
      if (!rec || rec.status === "none") return;
      rows.push([
        formatDateLabel(date), s.name, s.id,
        rec.time || "", rec.status === "present" ? "출석" : "결석", rec.method || "수동"
      ]);
    });
  });

  const csv = "\uFEFF" + rows.map(r => r.join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `출석부_${CLASS_NAME}_${getTodayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function syncToSheets() {
  if (SCRIPT_URL === "여기에_구글_앱스_스크립트_URL_입력") {
    alert("SCRIPT_URL을 먼저 설정해주세요.\n내보내기 탭에서 Apps Script 코드를 확인하세요.");
    return;
  }

  const dateData = attendance[currentDate] || {};
  const records = STUDENTS.map(s => ({
    name: s.name,
    id: s.id,
    status: dateData[s.name]?.status || "none",
    time: dateData[s.name]?.time || "",
    method: dateData[s.name]?.method || ""
  }));

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "sync",
        date: currentDate,
        dateLabel: formatDateLabel(currentDate),
        className: CLASS_NAME,
        records
      })
    });
    alert(`✅ ${formatDateLabel(currentDate)} 출석 데이터를 Google Sheets에 동기화했습니다.`);
  } catch(e) {
    alert("동기화 실패. URL을 확인해주세요.");
  }
}

function renderScript() {
  const code = `// ============================================
// 출석부 Google Apps Script
// ============================================

const SPREADSHEET_ID = "여기에_스프레드시트_ID_입력";
// (스프레드시트 URL에서 /d/ 뒤 부분)

function doPost(e) {
  const data = JSON.parse(e.postData.contents);
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  
  if (data.action === "attend") {
    // QR/링크로 개별 출석 체크
    handleAttend(ss, data);
  } else if (data.action === "sync") {
    // 선생님 앱에서 전체 동기화
    handleSync(ss, data);
  }
  
  return ContentService
    .createTextOutput(JSON.stringify({success: true}))
    .setMimeType(ContentService.MimeType.JSON);
}

function handleAttend(ss, data) {
  const dateLabel = data.dateLabel; // "6/1(월)"
  let sheet = ss.getSheetByName(dateLabel);
  
  // 날짜 시트가 없으면 자동 생성
  if (!sheet) {
    sheet = ss.insertSheet(dateLabel);
    sheet.appendRow(["이름", "학번", "출석시간", "상태", "방법"]);
  }
  
  // 이미 출석했는지 확인
  const data_range = sheet.getDataRange().getValues();
  for (let i = 1; i < data_range.length; i++) {
    if (data_range[i][0] === data.name) {
      return; // 중복 출석 방지
    }
  }
  
  sheet.appendRow([
    data.name,
    data.studentId,
    data.timestamp,
    "출석",
    "QR/링크"
  ]);
}

function handleSync(ss, data) {
  const dateLabel = data.dateLabel;
  let sheet = ss.getSheetByName(dateLabel);
  
  if (!sheet) {
    sheet = ss.insertSheet(dateLabel);
  } else {
    sheet.clearContents();
  }
  
  // 헤더
  sheet.appendRow(["이름", "학번", "출석시간", "상태", "방법"]);
  
  // 전체 학생 기록
  data.records.forEach(r => {
    if (r.status === "none") return;
    sheet.appendRow([
      r.name,
      r.id,
      r.time,
      r.status === "present" ? "출석" : "결석",
      r.method || "수동"
    ]);
  });
  
  // 서식: 헤더 굵게
  sheet.getRange("A1:E1").setFontWeight("bold");
  sheet.setFrozenRows(1);
}`;
  document.getElementById("script-code").textContent = code;
}

function copyScript() {
  navigator.clipboard.writeText(document.getElementById("script-code").textContent);
  alert("코드가 복사되었습니다!");
}

function switchTab(id) {
  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", ["today","history","export"][i] === id);
  });
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + id).classList.add("active");
}
